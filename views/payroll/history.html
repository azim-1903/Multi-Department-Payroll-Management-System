<h1>Payroll History</h1>
<div class="card">
  <form method="get" action="/payroll/history" class="row">
    <select name="month">
      <option value="">All Months</option>
      <% months.forEach((m) => { %>
        <option value="<%= m.value %>" <%= Number(filters.month) === Number(m.value) ? "selected" : "" %>><%= m.label %></option>
      <% }) %>
    </select>
    <select name="year">
      <option value="">All Years</option>
      <% for (let y = 2020; y <= 2030; y++) { %>
        <option value="<%= y %>" <%= Number(filters.year) === y ? "selected" : "" %>><%= y %></option>
      <% } %>
    </select>
    <select name="department_id">
      <option value="">All Departments</option>
      <% departments.forEach((d) => { %>
        <option value="<%= d.id %>" <%= Number(filters.departmentId) === Number(d.id) ? "selected" : "" %>><%= d.name %></option>
      <% }) %>
    </select>
    <button type="submit">Filter</button>
  </form>
</div>
<div class="card">
  <table>
    <thead><tr><th>Employee</th><th>Department</th><th>Month/Year</th><th>Gross</th><th>Net</th><th>Actions</th></tr></thead>
    <tbody>
      <% records.forEach((r) => { %>
      <tr>
        <td><%= r.employee_name %></td>
        <td><%= r.department_name %></td>
        <td><%= r.month %>/<%= r.year %></td>
        <td><%= formatMoney(r.gross_pay) %></td>
        <td><%= formatMoney(r.net_pay) %></td>
        <td>
          <a class="btn btn-secondary" href="/payroll/<%= r.id %>/payslip">View Payslip</a>
          <form method="post" action="/payroll/<%= r.id %>/delete" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this payroll record?');">
            <button type="submit" class="btn btn-danger">Delete</button>
          </form>
        </td>
      </tr>
      <% }) %>
    </tbody>
  </table>
</div>
