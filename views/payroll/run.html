<h1>Run Payroll</h1>
<div class="card" style="max-width:560px;">
  <form method="post" action="/payroll/run" class="row" style="flex-direction:column; align-items:stretch;">
    <label>Month</label>
    <select name="month" required>
      <% months.forEach((m) => { %>
        <option value="<%= m.value %>"><%= m.label %></option>
      <% }) %>
    </select>
    <label>Year</label>
    <select name="year" required>
      <% for (let y = 2020; y <= 2030; y++) { %>
        <option value="<%= y %>" <%= y === year ? "selected" : "" %>><%= y %></option>
      <% } %>
    </select>
    <button type="submit" onclick="return confirm('Run payroll for all employees?')">Run Payroll</button>
  </form>
</div>
