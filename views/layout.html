<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><%= title %> - Payroll System</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
      .container { width: min(1100px, 94vw); margin: 24px auto; }
      .card { background: white; border-radius: 10px; padding: 18px; box-shadow: 0 1px 3px rgba(0,0,0,.08); margin-bottom: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
      input, select { padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; min-width: 120px; }
      button, .btn { background: #2563eb; color: white; border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; text-decoration: none; display: inline-block; }
      .btn-danger { background: #dc2626; }
      .btn-secondary { background: #4b5563; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 10px; text-align: left; }
      .nav { background: #111827; color: white; padding: 12px 0; }
      .nav a { color: white; margin-right: 14px; text-decoration: none; }
      .flash { padding: 10px; border-radius: 8px; margin-bottom: 12px; }
      .flash.success { background: #dcfce7; color: #166534; }
      .flash.error { background: #fee2e2; color: #991b1b; }
      h1, h2 { margin-top: 0; }
    </style>
  </head>
  <body>
    <% if (user) { %>
      <div class="nav">
        <div class="container row" style="justify-content: space-between;">
          <div>
            <a href="/dashboard">Dashboard</a>
            <a href="/departments">Departments</a>
            <a href="/employees">Employees</a>
            <a href="/payroll/run">Run Payroll</a>
            <a href="/payroll/history">Payroll History</a>
          </div>
          <div class="row">
            <span><%= user.name %></span>
            <form method="post" action="/logout" style="margin:0;">
              <button type="submit" class="btn-secondary">Logout</button>
            </form>
          </div>
        </div>
      </div>
    <% } %>

    <div class="container">
      <% if (flash) { %>
        <div class="flash <%= flash.type %>"><%= flash.text %></div>
      <% } %>
      <%- include(bodyView) %>
    </div>
  </body>
</html>
